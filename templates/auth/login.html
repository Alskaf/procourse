{% extends "auth/baseauth.html" %}


{% block bodyforms %}

<div class="container" style="width:400px; margin-top:50px; margin-bottom:50px; font-family: 'Poppins', sans-serif; background-color:#1c2e41; border-radius:10px; padding:20px; box-shadow:0px 0px 10px 0px rgba(0,0,0,0.1)">
  <div class="form-container">
    <h3 class="text-center mb-4 fw-bold">Sign In</h3>

    {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
          {{ message }}
        </div>
        {% endfor %}
    {% endif %}

    <form method="post" action="/auth/login/">{% csrf_token %}
      <div class="mb-3">
        <label for="email" class="form-label">Email address</label>
        <input type="email" class="form-control" name="email" id="email" placeholder="name@example.com" required>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="rememberMe" name="rememberMe">
          <label class="form-check-label text-white" for="rememberMe">Remember me</label>
        </div>
        <a href="#" class="text-primary text-decoration-none fw-semibold">Forgot password?</a>
      </div>

      <div class="d-grid gap-2">
        <button type="submit" class="btn btn-primary">Sign In</button>
      </div>

      <div class="mt-4 text-center">
        <p class="mb-0 text-white">Don’t have an account?
          <a href="{% url 'handlesignup' %}" class="text-primary text-decoration-none fw-semibold">Create Account</a>
        </p>
      </div>
    </form>
  </div>
</div>

{% endblock bodyforms %}
