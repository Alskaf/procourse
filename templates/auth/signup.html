{% extends "auth/baseauth.html" %}

{% block bodyforms %}

<div class="container" style="width:400px; margin-top:50px; margin-bottom:50px; font-family: 'Poppins', sans-serif ;background-color: #1c2e41; border-radius: 10px; padding: 20px; box-shadow: 0px 0px 10px 0px rgba(0,0,0,0.1)">
    <div class="form-container">
        <h3 class="text-center mb-4 fw-bold">Create Account</h3>
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        <form method="post">{% csrf_token %}
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
               <input type="email" class="form-control" name="email"  id="email" placeholder="name@example.com" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="pass1" name="pass1" placeholder="Enter password" required>
            </div>

            <div class="mb-3">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="pass2" name="pass2" placeholder="Repeat password" required>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">Sign Up</button>
            </div>

             <div class="mt-4 text-center">
                <p class="mb-0 text-white">Already have an account? 
                    <a href="{% url 'handlelogin' %}" class="text-primary text-decoration-none fw-semibold">Sign In</a>
                </p>
            </div>
        </form>
    </div>
</div>
{% endblock bodyforms %}
